<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TatarHost Studio | Создание сайтов</title>
    <style>
        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --magenta: #ff00e1;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0d0d0d 0%, #000 100%); z-index: -1; }

        header {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); z-index: 1000;
        }

        .logo { font-weight: 900; letter-spacing: 1px; background: linear-gradient(90deg, var(--accent), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ОСНОВНОЙ ГРИД */
        .main-layout {
            display: grid; grid-template-columns: 320px 1fr 1fr 320px;
            gap: 12px; padding: 12px; height: calc(100vh - 60px); flex: 1;
        }

        .panel { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px); }
        .panel-header { padding: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }

        textarea { flex: 1; background: transparent; border: none; color: var(--accent); padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; outline: none; resize: none; }
        iframe { flex: 1; background: #fff; border: none; }

        /* ИНТЕРФЕЙС ПУБЛИКАЦИИ */
        .publish-area { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 20px; }
        .input-group label { font-size: 10px; color: var(--accent); display: block; margin-bottom: 8px; }
        input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; outline: none; }

        .result-card {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--accent);
            border-radius: 15px; padding: 15px; margin-top: 10px; display: none;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } }

        .site-url { font-size: 11px; color: var(--success); word-break: break-all; margin-bottom: 15px; display: block; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-pub { background: linear-gradient(45deg, var(--accent), var(--magenta)); color: black; }
        .btn-copy { background: var(--success); color: black; font-size: 12px; }
        .btn-visit { background: white; color: black; font-size: 12px; text-decoration: none; display: block; text-align: center; }

        /* МОБИЛЬНАЯ ОПТИМИЗАЦИЯ */
        .mobile-nav { display: none; height: 70px; background: #000; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; }
        .tab-btn { color: #555; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .tab-btn.active { color: var(--accent); }

        @media (max-width: 1100px) {
            .main-layout { grid-template-columns: 1fr; padding-bottom: 80px; }
            .panel { display: none; }
            .panel.active-tab { display: flex; }
            .mobile-nav { display: flex; }
        }

        /* Чат */
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 13px; max-width: 85%; }
        .ai { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .user { background: var(--accent); color: black; align-self: flex-end; }
    </style>
</head>
<body>

<div class="glow"></div>

<header>
    <div class="logo">TATAR_HOST STUDIO</div>
    <div style="display: flex; gap: 10px;">
        <button onclick="toggleFS()" style="background:none; border:1px solid var(--border); color:white; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">FULLSCREEN</button>
        <div id="status" style="font-size: 10px; color: lime; align-self: center;">● ONLINE</div>
    </div>
</header>

<main class="main-layout">
    
    <!-- ПАНЕЛЬ 1: ИНФО И ПУБЛИКАЦИЯ -->
    <aside class="panel active-tab" id="tab-info">
        <div class="panel-header">Конфигурация сайта</div>
        <div class="publish-area">
            <div class="input-group">
                <label>ИМЯ ВАШЕГО САЙТА (ЛАТИНИЦЕЙ)</label>
                <input type="text" id="project-name" placeholder="my-awesome-site" oninput="updateLinkHint()">
                <p id="link-hint" style="font-size: 9px; color: #666; margin-top: 5px;">Ссылка: https://tatarhost.github.io/_/...</p>
            </div>

            <button class="btn btn-pub" onclick="publish()">ОПУБЛИКОВАТЬ САЙТ</button>

            <div id="result-card" class="result-card">
                <p style="font-size: 10px; margin-bottom: 5px;">ГОТОВО! ВАШ САЙТ ДОСТУПЕН:</p>
                <span id="final-url" class="site-url"></span>
                <button class="btn btn-copy" onclick="copyLink()">СКОПИРОВАТЬ ССЫЛКУ</button>
                <a id="visit-link" href="#" target="_blank" class="btn btn-visit">ОТКРЫТЬ САЙТ</a>
            </div>
        </div>
    </aside>

    <!-- ПАНЕЛЬ 2: РЕДАКТОР -->
    <section class="panel" id="tab-code">
        <div class="panel-header">Редактор кода</div>
        <textarea id="editor" oninput="render()" spellcheck="false">
<style>
  body { background: #000; color: #0ff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  h1 { border: 2px solid #0ff; padding: 20px; border-radius: 20px; box-shadow: 0 0 20px #0ff; }
</style>
<h1>Новый сайт на TatarHost</h1></textarea>
    </section>

    <!-- ПАНЕЛЬ 3: ПРЕВЬЮ -->
    <section class="panel" id="tab-view">
        <div class="panel-header">Предпросмотр</div>
        <iframe id="preview"></iframe>
    </section>

    <!-- ПАНЕЛЬ 4: ИИ -->
    <section class="panel" id="tab-ai">
        <div class="panel-header">AI Ассистент</div>
        <div class="chat-box" id="chat">
            <div class="msg ai">Привет! Я помогу тебе наполнить сайт контентом. Что хочешь создать?</div>
        </div>
        <div style="padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 5px;">
            <input type="text" id="ai-in" placeholder="Запрос...">
            <button onclick="askAI()" style="background:var(--accent); border:none; border-radius:8px; padding:0 15px;">➜</button>
        </div>
    </section>

</main>

<nav class="mobile-nav">
    <div class="tab-btn active" onclick="switchTab('tab-info', this)"><span>⚙️</span>ИНФО</div>
    <div class="tab-btn" onclick="switchTab('tab-code', this)"><span>📝</span>КОД</div>
    <div class="tab-btn" onclick="switchTab('tab-view', this)"><span>👁️</span>ВИД</div>
    <div class="tab-btn" onclick="switchTab('tab-ai', this)"><span>🤖</span>ИИ</div>
</nav>

<script>
    const API_KEY = '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';
    const BASE_URL = 'https://tatarhost.github.io/_/';

    function render() {
        const code = document.getElementById('editor').value;
        const frame = document.getElementById('preview').contentWindow.document;
        frame.open(); frame.write(code); frame.close();
    }
    render();

    function updateLinkHint() {
        const name = document.getElementById('project-name').value;
        document.getElementById('link-hint').innerText = `Ссылка: ${BASE_URL}${name}`;
    }

    function switchTab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-tab'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-tab');
        el.classList.add('active');
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // ГЛАВНАЯ ЛОГИКА ПУБЛИКАЦИИ
    function publish() {
        const name = document.getElementById('project-name').value.trim();
        if(!name) { alert("Введите имя проекта!"); return; }

        const finalUrl = BASE_URL + name + "/";
        
        // Показываем карточку результата
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('final-url').innerText = finalUrl;
        document.getElementById('visit-link').href = finalUrl;

        alert("Успешно! Сайт будет создан в папке: " + name);
    }

    function copyLink() {
        const url = document.getElementById('final-url').innerText;
        navigator.clipboard.writeText(url).then(() => {
            alert("Ссылка скопирована!");
        });
    }

    async function askAI() {
        const inp = document.getElementById('ai-in');
        if(!inp.value) return;
        addMsg(inp.value, 'user');
        const q = inp.value; inp.value = '';
        
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    "model": "stepfun/step-3.5-flash:free",
                    "messages": [{"role": "user", "content": q}]
                })
            });
            const data = await res.json();
            addMsg(data.choices[0].message.content, 'ai');
        } catch(e) { addMsg("Ошибка API", "ai"); }
    }

    function addMsg(t, c) {
        const b = document.getElementById('chat');
        const m = document.createElement('div'); m.className = 'msg ' + c;
        m.innerText = t; b.appendChild(m);
        b.scrollTop = b.scrollHeight;
    }
</script>

</body>
</html>
