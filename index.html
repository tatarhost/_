<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TatarHost | Cloud Engine</title>
    <script>
        // Скрипт-роутер: Если в ссылке есть код сайта, показываем только его
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const siteData = window.location.hash.substring(1); // Берем код из #

            if (urlParams.has('s') && siteData) {
                try {
                    const decodedCode = decodeURIComponent(atob(siteData));
                    document.open();
                    document.write(decodedCode);
                    document.close();
                } catch (e) {
                    console.error("Ошибка загрузки сайта");
                }
            }
        };
    </script>
    <style>
        :root {
            --bg: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --purple: #bf00ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Дизайн */
        header {
            height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 900; background: linear-gradient(90deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; }

        .main-grid {
            display: grid; grid-template-columns: 300px 1fr 1fr 300px; gap: 10px; padding: 10px; flex: 1;
        }

        .panel {
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px);
        }

        .panel-header { padding: 10px 15px; font-size: 10px; font-weight: bold; color: rgba(255,255,255,0.3); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01); }

        /* Элементы */
        textarea { flex: 1; background: transparent; border: none; color: var(--accent); padding: 15px; font-family: monospace; outline: none; resize: none; font-size: 13px; }
        iframe { flex: 1; background: white; border: none; }

        .btn {
            background: linear-gradient(45deg, var(--accent), var(--purple)); color: black;
            border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }

        /* Поле ссылки */
        .link-container {
            margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid var(--accent);
            display: none; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }

        .url-text { font-size: 11px; color: var(--accent); word-break: break-all; margin-bottom: 10px; display: block; }

        /* Мобильная адаптация */
        .mobile-nav { display: none; height: 65px; background: #000; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; }
        .tab-btn { color: #555; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .tab-btn.active { color: var(--accent); }

        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; padding-bottom: 75px; }
            .panel { display: none; }
            .panel.active-tab { display: flex; }
            .mobile-nav { display: flex; }
        }

        /* Чат */
        .chat { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; display: flex; flex-direction: column; gap: 8px; }
        .m { padding: 8px 12px; border-radius: 12px; max-width: 85%; }
        .m.ai { background: rgba(255,255,255,0.05); }
        .m.user { background: var(--accent); color: black; align-self: flex-end; }
    </style>
</head>
<body>

<header>
    <div class="logo">TATARHOST STUDIO</div>
    <button onclick="toggleFS()" style="background:none; border:1px solid var(--border); color:white; padding:5px 10px; border-radius:8px; font-size:10px;">FULLSCREEN</button>
</header>

<main class="main-grid">
    <!-- Инфо и Публикация -->
    <aside class="panel active-tab" id="p-info">
        <div class="panel-header">Публикация</div>
        <div style="padding: 20px;">
            <label style="font-size: 10px; color: #888;">НАЗВАНИЕ САЙТА</label>
            <input type="text" id="site-name" placeholder="my-project" style="width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: white; border-radius: 10px; margin: 10px 0;">
            
            <button class="btn" style="width: 100%;" onclick="publish()">ОПУБЛИКОВАТЬ</button>

            <div id="result" class="link-container">
                <span style="font-size: 10px;">ВАША КРАСИВАЯ ССЫЛКА:</span>
                <span id="output-url" class="url-text"></span>
                <button class="btn" style="width: 100%; font-size: 11px; background: white;" onclick="copyLink()">СКОПИРОВАТЬ</button>
            </div>
        </div>
    </aside>

    <!-- Код -->
    <section class="panel" id="p-code">
        <div class="panel-header">HTML Editor</div>
        <textarea id="editor" oninput="updatePreview()" spellcheck="false">
<style>
  body { background: #000; color: #00f2ff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
  h1 { text-shadow: 0 0 20px #00f2ff; border: 2px solid #00f2ff; padding: 20px; border-radius: 20px; }
</style>
<h1>Мой новый сайт</h1>
<p>Создано на TatarHost</p></textarea>
    </section>

    <!-- Вид -->
    <section class="panel" id="p-view">
        <div class="panel-header">Live Preview</div>
        <iframe id="viewer"></iframe>
    </section>

    <!-- ИИ -->
    <section class="panel" id="p-ai">
        <div class="panel-header">AI Helper (Step-3.5)</div>
        <div class="chat" id="chat">
            <div class="m ai">Привет! Напиши, какой сайт ты хочешь, и я дам тебе код.</div>
        </div>
        <div style="padding: 10px; display: flex; gap: 5px;">
            <input type="text" id="ai-in" placeholder="Запрос..." style="flex:1; padding: 8px; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px;">
            <button onclick="askAI()" style="background: var(--accent); border:none; padding: 10px; border-radius: 8px;">➜</button>
        </div>
    </section>
</main>

<nav class="mobile-nav">
    <div class="tab-btn active" onclick="showT('p-info', this)"><span>⚙️</span>ИНФО</div>
    <div class="tab-btn" onclick="showT('p-code', this)"><span>📝</span>КОД</div>
    <div class="tab-btn" onclick="showT('p-view', this)"><span>👁️</span>ВИД</div>
    <div class="tab-btn" onclick="showT('p-ai', this)"><span>🤖</span>ИИ</div>
</nav>

<script>
    const API_KEY = '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';

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const v = document.getElementById('viewer').contentWindow.document;
        v.open(); v.write(code); v.close();
    }
    updatePreview();

    function showT(id, b) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-tab'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active-tab');
        b.classList.add('active');
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // ЛОГИКА ПУБЛИКАЦИИ (ВИРТУАЛЬНЫЙ ХОСТИНГ)
    function publish() {
        const name = document.getElementById('site-name').value || 'project';
        const code = document.getElementById('editor').value;
        
        // Кодируем код сайта в Base64
        const encodedCode = btoa(encodeURIComponent(code));
        
        // Формируем красивую ссылку
        const finalUrl = `https://tatarhost.github.io/_/?s=${name}#${encodedCode}`;
        
        document.getElementById('result').style.display = 'block';
        document.getElementById('output-url').innerText = finalUrl;
        
        alert("Сайт опубликован виртуально!");
    }

    function copyLink() {
        const url = document.getElementById('output-url').innerText;
        navigator.clipboard.writeText(url).then(() => alert("Ссылка скопирована!"));
    }

    async function askAI() {
        const inp = document.getElementById('ai-in');
        const q = inp.value; if(!q) return;
        addM(q, 'user'); inp.value = '';
        
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    "model": "stepfun/step-3.5-flash:free",
                    "messages": [{"role": "user", "content": "Write HTML/CSS code for: " + q}]
                })
            });
            const data = await res.json();
            addM(data.choices[0].message.content, 'ai');
        } catch(e) { addM("Ошибка API", "ai"); }
    }

    function addM(t, c) {
        const b = document.getElementById('chat');
        const m = document.createElement('div'); m.className = 'm ' + c;
        m.innerText = t; b.appendChild(m);
        b.scrollTop = b.scrollHeight;
    }
</script>

</body>
</html>
